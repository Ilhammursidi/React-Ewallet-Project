name: Build and Push to GHCR
on:
    push:
        branches:
            - master
jobs:
    build_and_publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            - name: Push to GHCR
              uses: macbre/push-to-ghcr@master
              with:
                image_name: ${{ github.repository }}
                github_token: ${{ secrets.GITHUB_TOKEN }} 
